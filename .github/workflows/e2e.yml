on:
  repository_dispatch:
    types: [run-e2e-tests]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (staging | prod)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

jobs:
  e2e:
    name: Playwright (${{ github.event.client_payload.environment || inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # utils/environment.ts uppercases this and looks it up in its config map
      # (LOCAL | DEV | STAGING | PROD) — it resolves baseURL/apiURL itself.
      ENVIRONMENT: ${{ github.event.client_payload.environment || inputs.environment }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ env.ENVIRONMENT }}
          path: playwright-report/
          retention-days: 14
