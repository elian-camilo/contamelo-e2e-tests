on:
  repository_dispatch:
    types: [run-e2e-tests]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (staging | production)"
        required: true
        default: "staging"
      url:
        description: "Base URL to test against"
        required: true

jobs:
  e2e:
    name: Playwright (${{ github.event.client_payload.environment || inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_ENV: ${{ github.event.client_payload.environment || inputs.environment }}
      TARGET_URL: ${{ github.event.client_payload.url || inputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ env.TARGET_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ env.TARGET_ENV }}
          path: playwright-report/
          retention-days: 14